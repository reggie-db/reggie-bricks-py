[build-system]
requires = ["uv_build>=0.9.6,<0.10.0"]
build-backend = "uv_build"

[project]
name = "dbx-ai"
version = "0.0.1+geb20549"
requires-python = ">=3.12,<3.13"
dependencies = [
    "databricks-tools-core",
    "dbx-tools @ file://${PROJECT_ROOT}/../dbx-tools",
    "pydantic_ai",
]

[dependency-groups]
dev = ["textual", "google-auth", "google-auth-oauthlib", "emlx"]

[tool.uv.sources.dbx-tools]
workspace = true

[tool.uv.sources.databricks-tools-core]
git = "https://github.com/databricks-solutions/ai-dev-kit.git"
subdirectory = "databricks-tools-core"
