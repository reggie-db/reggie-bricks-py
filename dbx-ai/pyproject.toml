[build-system]
requires = ["uv_build>=0.9.6,<0.10.0"]
build-backend = "uv_build"

[project]
name = "dbx-ai"
version = "0.0.1+rev0dd7f69"
requires-python = ">=3.11,<3.13"
dependencies = [
    "dbx-tools @ file://${PROJECT_ROOT}/../dbx-tools",
    "lfp-types",
    "pydantic_ai",
]

[tool.uv.sources.dbx-tools]
workspace = true
